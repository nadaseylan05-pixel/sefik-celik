<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <title>{% block title %}Çelik Hukuk Bürosu{% endblock %}</title>
    {% block extra_meta %}
    {% endblock %}
    <style>
        :root {
            --footer-bg: #01040f;
            --footer-text: #94a3b8;
            --main-blue: #00c6ff;
            --nav-bg: rgba(0, 0, 0, 0.85);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background:#020617; color:#e0e0e0; overflow-x:hidden; line-height: 1.6; }

        /* ===== NAVBAR  ===== */
        .navbar {
            position: fixed; top:0; width:100%; height:75px;
            background: var(--nav-bg); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.08); z-index:2000;
            display: flex; align-items: center; transition: 0.4s;
        }
        .nav-container {
            width:90%; max-width:1200px; margin:0 auto;
            display:flex; justify-content:space-between; align-items:center; position: relative;
        }
        .logo { font-size:1.4rem; font-weight:800; color:#fff; text-decoration:none; letter-spacing: 1px; }
        .logo span { color: var(--main-blue); font-weight:300; }

        /* (MENU Trigger) */
        .menu-wrapper { position: relative; display:flex; align-items:center; height:75px; cursor: pointer; }
        
        .nav-trigger {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 20px; border-radius: 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s all ease;
        }
        .nav-trigger span { font-size: 0.85rem; font-weight: 600; letter-spacing: 1.5px; color: #fff; }
        .nav-trigger i { color: var(--main-blue); transition: transform 0.3s; }

        .menu-wrapper:hover .nav-trigger { 
            background: rgba(0, 198, 255, 0.15); 
            border-color: var(--main-blue);
        }

        /* Menu (Animation) */
        .dropdown-menu-custom {
            position: absolute; top: 80px; right: 0; width: 260px;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(25px);
            border-radius: 18px; padding: 15px 0;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            
            /* gradual appearance effect */
            opacity: 0; transform: translateY(-15px); pointer-events: none;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .menu-wrapper.active .dropdown-menu-custom{
            opacity: 1; transform: translateY(0); pointer-events: auto;
        }

        .dropdown-menu-custom a {
            padding: 12px 25px; color: #bbb; text-decoration: none;
            font-size: 0.95rem; display: flex; align-items: center; gap: 15px;
            transition: 0.3s;
        }
        .dropdown-menu-custom a i { width: 20px; color: var(--main-blue); font-size: 1.1rem; }
        
        .dropdown-menu-custom a:hover {
            background: rgba(0, 198, 255, 0.1);
            color: #fff; padding-left: 35px;
        }

        .dropdown-menu-custom hr { border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0; }

        /* ===== FOOTER ===== */
        footer {
            padding: 50px 0; text-align: center;
            background: var(--footer-bg); color: var(--footer-text);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">ÇELİK HUKUK<span> BÜROSU</span></a>
            
            <div class="menu-wrapper" id="menuWrapper">
                <div class="nav-trigger">
                    <span>MENU</span>
                    <i class="fa fa-bars" id="menu-icon"></i>
                </div>
                
                <div class="dropdown-menu-custom">
                    <a href="{% url 'home' %}"><i class="fas fa-home"></i> Anasayfa</a>
                    <a href="{% url 'hakimizda' %}"><i class="fas fa-info-circle"></i> Hakkımızda</a>
                    <a href="{% url 'ekibimiz' %}"><i class="fas fa-users"></i> Ekibimiz</a>
                    <a href="{% url 'Çalışma_alanları' %}"><i class="fas fa-briefcase"></i> Çalışma Alanları</a>
                    <a href="{% url 'kariyer' %}"><i class="fas fa-user-graduate"></i> Kariyer</a>
                    <a href="{% url 'blog' %}"><i class="fas fa-pen-nib"></i> Blog</a>
                    <hr>
                    <a href="{% url 'iletişim' %}"><i class="fas fa-envelope"></i> İletişim</a>
                </div>
            </div>
        </div>
    </nav>

    <main style="min-height: 85vh; padding-top: 75px;">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            {% block footer_content %}

                <p style="font-size: 0.8rem; margin-top: 10px;">{{ content1.footer_text }}</p>
            {% endblock %}
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
        
            const wrapper = document.getElementById('menuWrapper');
            const icon = document.getElementById('menu-icon');
        
            if (!wrapper || !icon) return;
        
            wrapper.addEventListener('click', (e) => {
                e.stopPropagation();
                wrapper.classList.toggle('active');
        
                if (wrapper.classList.contains('active')) {
                    icon.classList.replace('fa-bars', 'fa-times');
                    icon.style.transform = 'rotate(90deg)';
                } else {
                    icon.classList.replace('fa-times', 'fa-bars');
                    icon.style.transform = 'rotate(0deg)';
                }
            });
        
            document.addEventListener('click', () => {
                wrapper.classList.remove('active');
                icon.classList.replace('fa-times', 'fa-bars');
                icon.style.transform = 'rotate(0deg)';
            });
        
            window.addEventListener('scroll', () => {
                const nav = document.querySelector('.navbar');
                if (!nav) return;
        
                if (window.scrollY > 50) {
                    nav.style.background = 'rgba(0, 0, 0, 0.95)';
                    nav.style.height = '65px';
                } else {
                    nav.style.background = 'rgba(0, 0, 0, 0.85)';
                    nav.style.height = '75px';
                }
            });
        
        });
     </script>
</body>
</html>
